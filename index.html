<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swindon Books HK • Since 1918</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #F6F2EA; }
    .serif { font-family: 'Playfair Display', Georgia, serif; }
    .crimson-text { color: #532C2E; }
   
    /* Updated button color */
    .orange-btn {
      background-color: #FF6215;
      color: white;
      transition: all 200ms ease;
    }
    .orange-btn:hover {
      background-color: #E55A14;
    }

    .carousel { position: relative; height: 380px; overflow: hidden; }
    .carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1000ms ease; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .carousel-caption {
      position: absolute; bottom: 40px; left: 40px;
      background: rgba(83,44,46,0.85); color: white;
      padding: 12px 28px; border-radius: 50px;
      font-size: 1.1rem; font-weight: 600;
    }
    /* WeChat QR Modal */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-content { background-color: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    .modal-close { position: absolute; top: 20px; right: 20px; font-size: 28px; font-weight: bold; cursor: pointer; color: #999; }
    .modal-close:hover { color: #000; }
    .qr-code { width: 250px; height: 250px; margin: 20px auto; background-color: #f0f0f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    /* Sub-header Search Bar */
    .search-subheader { background-color: #ffffff; border-bottom: 1px solid #e5e7eb; padding: 16px 0; }
    .search-input-wrapper { position: relative; max-width: 100%; }
    .search-input-wrapper input { width: 100%; padding: 14px 20px; font-size: 16px; border: 2px solid #e5e7eb; border-radius: 50px; transition: all 300ms ease; }
    .search-input-wrapper input:focus { outline: none; border-color: #532C2E; box-shadow: 0 0 0 3px rgba(83, 44, 46, 0.1); }
    .search-input-wrapper button { 
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%); 
      padding: 10px 24px; border-radius: 50px; border: none; cursor: pointer; 
      font-weight: 600; 
    }
    /* Affiliate Grid */
    .affiliate-logo { height: 120px; display: flex; align-items: center; justify-content: center; background-color: #f9f9f9; border-radius: 12px; padding: 16px; transition: transform 300ms ease, box-shadow 300ms ease; }
    .affiliate-logo:hover { transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
    .affiliate-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    /* Map Container */
    .map-container { width: 100%; height: 500px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    @media (max-width: 768px) { .map-container { height: 350px; } }
    /* Location Pins */
    .location-pin { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background-color: #532C2E; color: white; border-radius: 50px; font-size: 14px; font-weight: 600; }
    /* Navigation Links */
    .nav-link { color: #532C2E; }
    .nav-link:hover { color: #FF7A00; }
  </style>
</head>
<body>
  <!-- Main Header / NAV -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-4">
      <div class="flex items-center justify-between gap-6">
       
        <!-- Logo -->
        <a href="./" class="flex-shrink-0">
          <img src="image_eb7eb03.png" alt="Swindon Book Co. Ltd." class="h-14">
        </a>
        <!-- Navigation Links -->
        <div class="hidden lg:flex items-center gap-8 text-base font-medium flex-shrink-0">
          <a href="./" class="nav-link transition-colors">Browse Catalog</a>
          <a href="#" class="nav-link transition-colors">Categories</a>
          <a href="#" class="nav-link transition-colors">Textbooks</a>
          <a href="#stores" class="nav-link transition-colors">Our Stores</a>
          <a href="./about" class="nav-link transition-colors font-semibold">About Us</a>
        </div>
        <!-- Shop Button -->
        <a href="https://swindonbooks.myshopify.com" target="_blank"
           class="orange-btn hover:bg-[#E55A14] px-7 py-2.5 rounded-full font-medium transition flex-shrink-0 text-sm">
          Shop on Shopify
        </a>
      </div>
    </div>
  </nav>

  <!-- Sub-Header with Wide Search Bar -->
  <div class="search-subheader">
    <div class="max-w-7xl mx-auto px-8">
      <div class="search-input-wrapper">
        <input
          type="text"
          id="headerSearch"
          placeholder="Search by title, author, ISBN, or keyword..."
          onkeypress="if(event.key==='Enter') performHeaderSearch()">
        <button
          onclick="performHeaderSearch()"
          class="orange-btn">
          <i class="fas fa-search mr-2"></i>Search
        </button>
      </div>
    </div>
  </div>

  <!-- ... Rest of your content remains the same until the floating buttons and modal ... -->

  <!-- Floating Buttons -->
  <div class="fixed bottom-10 right-10 flex flex-col gap-5 z-40">
    <a href="https://wa.me/85290354949" target="_blank"
       class="bg-[#25D366] w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl text-4xl hover:scale-110 transition"
       title="Contact via WhatsApp">
      <i class="fa-brands fa-whatsapp"></i>
    </a>
    <button onclick="openWeChatModal()"
            class="bg-[#07C160] w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl text-3xl font-bold hover:scale-110 transition cursor-pointer border-none"
            title="Contact via WeChat">
      微信
    </button>
  </div>

  <!-- WeChat QR Code Modal -->
  <div id="wechatModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeWeChatModal()">&times;</span>
      <h2 class="serif text-3xl crimson-text mb-4">Connect on WeChat</h2>
      <p class="text-gray-700 mb-6">Scan the QR code below to add us on WeChat</p>
     
      <div class="qr-code">
        <img id="wechatQR" src="" alt="WeChat QR Code" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
     
      <p class="text-sm text-gray-600 mt-6">
        <strong>WeChat ID:</strong> swindonbooks_hk
      </p>
      <p class="text-xs text-gray-500 mt-2">
        Or search for "Swindon Books Hong Kong" in WeChat
      </p>
     
      <button onclick="closeWeChatModal()"
              class="mt-6 orange-btn px-8 py-3 rounded-full font-medium transition border-none cursor-pointer">
        Close
      </button>
    </div>
  </div>

  <!-- Footer (unchanged) -->
  <footer class="bg-[#1a2a2a] text-white py-20">
    <!-- ... your footer content ... -->
  </footer>

  <script>
    // ===== CAROUSEL FUNCTIONALITY =====
    let current = 0;
    const slides = document.querySelectorAll('.carousel-slide');
   
    function showSlide(n) {
      slides.forEach(s => s.classList.remove('active'));
      slides[n].classList.add('active');
    }
   
    function nextSlide() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }
   
    setInterval(nextSlide, 6500);

    // ===== HEADER SEARCH FUNCTIONALITY =====
    function performHeaderSearch() {
      const searchTerm = document.getElementById('headerSearch').value.trim();
      if (searchTerm) {
        window.location.href = `https://swindonbooks.myshopify.com/search?q=${encodeURIComponent(searchTerm)}`;
      } else {
        alert('Please enter a search term');
      }
    }

    // ===== WECHAT MODAL FUNCTIONALITY =====
    function openWeChatModal() {
      const modal = document.getElementById('wechatModal');
      const qrImg = document.getElementById('wechatQR');
     
      const wechatID = 'swindonbooks_hk';
      qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('https://weixin.qq.com/r/' + wechatID)}`;
     
      modal.classList.add('active');
    }

    function closeWeChatModal() {
      const modal = document.getElementById('wechatModal');
      modal.classList.remove('active');
    }

    window.onclick = function(event) {
      const modal = document.getElementById('wechatModal');
      if (event.target === modal) {
        modal.classList.remove('active');
      }
    };
  </script>
</body>
</html>
